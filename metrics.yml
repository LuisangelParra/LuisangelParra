# ---------------------------------------------------------------------------
#  .github/workflows/metrics.yml
#  Generates a STATIC metrics.svg in your repo root every 12 hours.
#  This replaces the github-readme-stats cards that were returning 502 —
#  because the output is a file in your repo, it can never rate-limit.
#
#  ONE-TIME SETUP:
#   1. Create a classic Personal Access Token:
#      github.com/settings/tokens  →  "Generate new token (classic)".
#      For PUBLIC stats only, you can leave all scopes UNCHECKED.
#      (Tick `repo` + `read:org` if you also want private-repo data.)
#   2. Save it as a repo secret named METRICS_TOKEN:
#      repo → Settings → Secrets and variables → Actions → New repository secret.
#   3. Commit this file, then run it once: Actions tab → "Metrics" → Run workflow.
#   4. Uncomment the metrics.svg <img> block in README.md.
# ---------------------------------------------------------------------------
name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:          # lets you run it manually
  push:
    branches: ["main"]        # change to "master" if that's your default branch

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: LuisangelParra
          filename: metrics.svg

          # --- look & feel (matches the README's indigo/cyan terminal theme) ---
          template: classic
          config_timezone: Europe/Berlin
          config_order: base.header, base.activity, base.community, languages, habits, achievements

          # --- what to show ---
          base: header, activity, community, repositories, metadata
          plugin_introduction: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
